name: .NET Core CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore GearTray.sln

    - name: Build solution
      run: dotnet build GearTray.sln --configuration Release --no-restore

    - name: Run tests
      run: dotnet test GearTray.sln --configuration Release --no-build --verbosity normal
